# Frontend-focused variant
#
# Demonstrates:
#   - TagExpr with any + not operators on experience
#   - pick bypassing tag filtering (Languages has [backend, frontend] tags
#     but is included because pick is explicit, not tag-dependent)
#   - global tags fallback (certifications has no config, so global tags
#     would apply — but certifications aren't in layout, so they're omitted)
#   - highlight-level tag + limit filtering
#   - projects: pick + tags combined (picked items first, then tag-matched)

meta:
  title: "Senior Frontend Engineer | React & UI Architecture"

summary: >-
  Senior Frontend Engineer specializing in React-based UI architecture with
  8+ years of experience. Built real-time collaboration features for 50K+
  users. Passionate about component design, accessibility, and developer
  experience.

layout: [summary, skills, experience, projects, education]

# Global tags — applied to any section without its own config.
# In this variant, every section has its own config, so this only serves
# as documentation of intent. If certifications were in layout without
# its own config block, it would inherit this filter.
tags: [frontend]

skills:
  # pick bypasses tag filtering entirely — Languages appears despite
  # having [backend, frontend] tags, because pick is explicit inclusion
  pick: [frontend, languages]

experience:
  # TagExpr: include companies tagged frontend, exclude devops-only
  tags:
    any: [frontend]
    not: [devops]
  highlights:
    tags: [frontend]
    limit: 3

projects:
  # pick + tags combined: react-form-builder first (picked), then any
  # remaining frontend-tagged projects in original order
  pick: [react-form-builder]
  tags: [frontend]
