# Backend-focused variant
#
# Demonstrates:
#   - meta override (title, location)
#   - custom summary replacement
#   - id-based pick for skills and projects
#   - 3-level experience selectors (company tags, role omit by id, highlight filtering)
#   - omit by id on experience companies
#   - limit on highlights and projects
#   - certifications filtered by tag
#   - style overrides (CSS custom properties)

meta:
  title: "Senior Backend Engineer | Distributed Systems"
  location: "San Francisco, CA (Remote)"

summary: >-
  Senior Backend Engineer with 8+ years building scalable distributed systems
  and APIs. Led architecture of event-driven microservices handling 10M+ daily
  events. Core stack: Python, Go, Node.js, PostgreSQL, AWS.

layout: [summary, skills, experience, projects, certifications, education]

skills:
  pick: [backend, infra, languages]
  limit: 3

experience:
  tags: [backend]
  omit: [digital-agency]
  roles:
    tags:
      any: [backend]
      not: [frontend]
    omit: [junior-dev]
    limit: 2
  highlights:
    tags: [backend]
    limit: 3

projects:
  pick: [fastcache, cli-toolkit]
  limit: 2

certifications:
  tags: [devops]

style:
  --line-height-normal: "1.2"
  --space-md: "0.5rem"
